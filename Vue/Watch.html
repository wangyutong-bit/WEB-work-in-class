<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Props 验证</title>
    <style>
        .msg {
            display: inline-block;
            margin-top: 4px;
            font-size: 14px;
        }

        .ok {
            color: #17803d;
        }

        .error {
            color: #c62828;
        }
    </style>
</head>
<body>
    <div id="app">
        用户名：<input type="text" v-model.trim="username"><br>
        密码：<input type="password" v-model="password"><br>
        确认密码：<input type="password" v-model="confirmPassword"><br><br>

        <register-info
            :username="username"
            :password="password"
            :confirm-password="confirmPassword">
        </register-info>
    </div>

    <template id="register-info">
        <div>
            <p>
                用户名：
                <span class="msg" :class="usernameValid ? 'ok' : 'error'">
                    {{ usernameMsg }}
                </span>
            </p>
            <p>
                密码：
                <span class="msg" :class="passwordValid ? 'ok' : 'error'">
                    {{ passwordMsg }}
                </span>
            </p>
            <p>
                确认密码：
                <span class="msg" :class="confirmValid ? 'ok' : 'error'">
                    {{ confirmMsg }}
                </span>
            </p>
        </div>
    </template>

    <script src="Ori-code/ch2/js/vue.global.js"></script>
    <script>
        const app = Vue.createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    confirmPassword: ''
                }
            }
        })

        app.component('register-info', {
            props: {
                username: {
                    type: String,
                    required: true,
                    validator(value) {
                        if (value === '') {
                            return true
                        }

                        return /^[A-Za-z0-9]{6,16}$/.test(value)
                    }
                },
                password: {
                    type: String,
                    required: true,
                    validator(value) {
                        return value === '' || value.length >= 8
                    }
                },
                confirmPassword: {
                    type: String,
                    required: true
                }
            },
            computed: {
                usernameValid() {
                    return /^[A-Za-z0-9]{6,16}$/.test(this.username)
                },
                passwordValid() {
                    return this.password.length >= 8
                },
                confirmValid() {
                    return this.confirmPassword !== '' && this.confirmPassword === this.password
                },
                usernameMsg() {
                    if (this.username === '') {
                        return '请输入用户名'
                    }

                    if (this.username.length < 6 || this.username.length > 16) {
                        return '用户名必须在 6-16 位之间'
                    }

                    if (!/^[A-Za-z0-9]+$/.test(this.username)) {
                        return '用户名只能由字母和数字组成'
                    }

                    return '用户名格式正确'
                },
                passwordMsg() {
                    if (this.password === '') {
                        return '请输入密码'
                    }

                    if (this.password.length < 8) {
                        return '密码不能少于 8 位'
                    }

                    return '密码格式正确'
                },
                confirmMsg() {
                    if (this.confirmPassword === '') {
                        return '请再次输入密码'
                    }

                    if (this.confirmPassword === this.password) {
                        return '两次密码一致'
                    }

                    return '两次密码不一致'
                }
            },
            template: '#register-info'
        })

        app.mount('#app')
    </script>
</body>
</html>
