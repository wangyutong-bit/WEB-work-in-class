<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>View UI Plus example</title>
	<!--引入CSS-->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/view-ui-plus/dist/styles/viewuiplus.css">
	<!--引入vue.js-->
    <script  src="https://unpkg.com/vue@next"></script>
	<!--引入view-ui-plus.js"-->
    <script  src="https://unpkg.com/view-ui-plus"></script>
</head>
<body>
<div id="app">
    <i-button @click="show">点击</i-button>
    <Modal v-model="visible" title="Welcome">View UI Plus欢迎您！</Modal>
</div>
<script>
    const app = Vue.createApp({
        data () {
            return {
                visible: false
            }
        },
        methods: {
            show () {
                this.visible = true;
            }
        }    
    });
    app.use(ViewUIPlus);
    app.mount("#app");
  </script>
</body>
</html>
