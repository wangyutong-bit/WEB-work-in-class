<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Vant UI自定义按钮滑块</title>
	<!-- 引入样式文件 -->
	<link rel="stylesheet" href="https://unpkg.com/vant/lib/index.css"/>
	<!-- 引入 Vue 和 Vant 的 JS 文件 -->
	<script src="https://unpkg.com/vue@next"></script>
	<script src="https://unpkg.com/vant"></script>
	<style>
	  .custom-button {
		width: 26px;
		color: #fff;
		font-size: 10px;
		line-height: 18px;
		text-align: center;
		background-color: #ee0a24;
		border-radius: 100px;
	  }
	</style>
</head>
<body>
<div id="app">
<br>
<br>
<van-slider v-model="value" active-color="#ee0a24" @change="onChange">
  <template #button>
    <div class="custom-button">{{ value }}</div>
  </template>
</van-slider>
</div>
<script>
    const app = Vue.createApp({
		setup() {
			const value = Vue.ref(50);
			const onChange = (value) => vant.Toast('当前值：' + value);
			return {
				value,
				onChange,
			};
		},
	});
    app.use(vant);
    app.mount("#app");
  </script>
</body>
</html>
