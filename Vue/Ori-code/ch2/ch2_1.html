<div id="myCart">
    <!--
        第1步：先准备一个页面区域，id="myCart" 是 Vue 之后要挂载的位置。
        第2步：给输入框加上 v-model，把输入框和 data 里的变量做双向绑定。
        这样输入框内容变化时，num1、price1、num2、price2 也会跟着变化。
    -->
    第一条边：<input type="text" v-model.number="num1"><br>
    第二条边：<input type="text" v-model.number="num2"><br>
    第三条边：<input type="text" v-model.number="num3"><br>
    是否为三角形：{{ result }}
</div>

<script src="js/vue.global.js"></script>
<script>
    // 第3步：创建一个 Vue 应用配置对象。
    const CounterApp = {
        // 第4步：data() 返回页面中要用到的响应式数据。
        // 这些数据会和模板中的输入框、插值表达式自动关联。
        data() {
            return {
                num1: 1,
                num2: 2,
                num3: 3,
            }
        },

        computed: {
    result() {
        const a = Number(this.num1)
        const b = Number(this.num2)
        const c = Number(this.num3)
        if (a + b > c && b + c > a && a + c > b)
            return '是三角形'
        return '不是三角形'
    }
}
    }

    // 第7步：创建 Vue 应用，并挂载到页面中的 #myCart。
    // 挂载后，这一块内容就由 Vue 接管，数据变化时页面会自动更新。
    Vue.createApp(CounterApp).mount('#myCart')
</script>
