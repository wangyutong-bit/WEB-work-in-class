<div id="cart">
    <template v-if="cartList.length">
        <table>
            <thead>
                <tr>
                    <th>商品类别</th>
                    <th>商品名称</th>
                    <th>商品单价</th>
                    <th>购买数量</th>
                    <th>操作</th>
                </tr>
                <tbody>
                    <tr v-for="(cartData,index) in cartList">
                        <td>{{ cartData.type }}</td>
                        <td colspan="4">
                            <table width="100%">
                            <tr v-for="(goods, index1) in cartData.items">
                                <td width="45%">{{ goods.gname }}</td>
                                <td width="15%">{{ goods.gprice }}</td>
                                <td width="25%">
                                    <button @click="reduce(index,index1)" :disabled="goods.count === 1">-</button>
                                        {{ goods.count }}
                                    <button @click="add(index,index1)">+</button>
                                </td>
                                <td width="15%">
                                    <button @click="remove(index,index1)">删除</button>
                                </td>
                            </tr>
                            </table>
                        </td>
                    </tr>
                </tbody>
            </thead>
        </table>
        <div>总价：¥ {{ totalPrice }}  <button @click="removeAll">清空购物车</button></div>
    </template>
    <div v-else>购物车为空</div>
</div>
<script src="js/vue.global.js"></script>
<script src="practice3_1.js"></script>
<style>
    table{
    border: 1px solid #e9e9e9;
    border-collapse:collapse;
    }
    th, td{
        padding: 8px 16px;
        border: 1px solid #e9e9e9;
    }
    th{
        background: #f7f7f7;
    }
</style>
