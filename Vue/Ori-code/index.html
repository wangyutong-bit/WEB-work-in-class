<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>
    <div id="myComputed">
        商品1数量：<input type="number" v-model="num1">
        商品1价格：<input type="number" v-model="p1">
        <br>
        商品2数量：<input type="number" v-model="num2">
        商品2价格：<input type="number" v-model="p2">
        <br>
        商品总价：{{textShow}}
    </div>

    <script src="./ch1/js/vue.global.js"></script>
    <script>
        const CounterApp = {
            data() {
                return {
                    num1: 0,
                    p1:0,
                    num2:0,
                    p2:0,
                }
            },
            computed: {
                textShow() {//计算属性textShow
                    return this.num1*this.p1+this.num2*this.p2;
                }
            }
        }
        Vue.createApp(CounterApp).mount('#myComputed')
    </script>

</body>

</html>
