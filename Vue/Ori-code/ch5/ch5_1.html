<div id="app">
    <button @click="show = !show">点我，我就渐渐的离开、渐渐的来。</button>
    <transition name="fade">
        <p v-show="show" :style="styleobj">动画实例</p>
    </transition>
</div>
<script src="js/vue.global.js"></script>
<script>
    const app = Vue.createApp({
        data() {
            return {
                show: true,
                styleobj: {
                    fontSize: '30px',
                    color: 'red'
                }
            }
        }
    })
    app.mount('#app')
</script>
<style>
    .fade-enter-active,
    .fade-leave-active {
        transition: opacity 2s ease;
    }
    .fade-enter-from,
    .fade-leave-to {
        opacity: 0;
    }
</style>
