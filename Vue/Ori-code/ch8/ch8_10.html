<script src="js/vue.global.js"></script>
<script>
    const count = Vue.ref(1)
    const plusOne = Vue.computed({
        get: () => count.value + 1,
        set: (val) => {
            console.log('执行set方法:' + val)
            count.value = val - 1
         },
    })
    console.log(plusOne.value) // 2
    plusOne.value = 5
    console.log(count.value) // 4
</script>
