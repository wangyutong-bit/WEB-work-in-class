<template id="stesting">
    {{mybook}}
</template>
<div id="app">
    <setup-testing :mytitle="book.title"></setup-testing>
</div>
<script src="js/vue.global.js"></script>
<script>
    const app = Vue.createApp({
        data() {
            return {
                book: {
                    id: 1,
                    title: 'My journey with Vue' 
                }
            }
        }
    })
    app.component('setup-testing', {
        props: ['mytitle'],
        setup(props) {
            //使用toRefs函数创建props属性的响应式引用
            title =  Vue.toRefs(props)
            //使用ES6解构
            console.log(title.mytitle.value)
            mybook = title
            // 暴露给 template
            return {
                mybook
            }
        },
        template: '#stesting'
    })
    app.mount('#app')
</script>
