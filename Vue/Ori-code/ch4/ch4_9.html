<template id="son">
    <div>{{ todos.length }}</div>
    <!--todo-son是todo-list的私有组件-->
    <todo-son></todo-son>
</template>
<template id="grandson">
    <div>
        <!--使用注入的数据-->
        {{ todoLength }}
    </div>
</template>
<div id="vmodel-post-demo">
    <!--父组件Vue实例传递数据todos给子组件todo-list-->
    <todo-list :todos="todos"></todo-list>
</div>
<script src="js/vue.global.js"></script>
<script>
    const app = Vue.createApp({
        data() {
            return {
                todos: ['Feed a cat', 'Buy tickets']
            }
        },
        provide() {//祖先组件app提供一个数据todoLength
            return {
                todoLength: this.todos.length
            }
        }
    })
    app.component('todo-list', {
        props: ['todos'],
        components:{//在父组件todo-list中定义子组件todo-son
            'todo-son':  {
                inject: ['todoLength'],//孙子组件注入数据todoLength供自己使用
                template: '#grandson'
            }
        },
        template: '#son'
    })
    app.mount('#vmodel-post-demo')
</script>
