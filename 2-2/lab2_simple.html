    <h1 align="center"><b>保护环境</b></h1>
    <p>保护环境是每个人的责任。我们应该减少使用塑料袋，节约用水，保护森林和野生动物。</p>
    <img src="https://www.news.cn/world/20250522/8a0d0e0d55ec43138f893af6921db962/t9Qgc54uWPKATFLS.jpg" alt="保护环境" width="200px" height="150px">
    <p>我们可以通过以下方式来保护环境：</p>
    <ol type="1">
        <li>减少使用塑料袋，改用环保袋。</li>
        <li>节约用水，关闭水龙头。</li>
        <li>保护森林，减少砍伐树木。</li>
        <li>保护野生动物，不捕猎它们。</li>
    </ol>
    <p>让我们一起努力，保护我们的地球家园！</p>
    <hr>
