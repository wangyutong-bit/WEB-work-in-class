<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task1 表格</title>
    <style>
        body {
            margin: 0;
            padding: 8px;
            font-family: "Microsoft YaHei", sans-serif;
            background: #ffffff;
        }

        table {
            width: 800px;
            margin: 0 auto;
            border: 1px solid #777;
            border-collapse: separate;
            border-spacing: 2px;
            background: #dcdcdc;
        }

        th,
        td {
            border: 1px solid #777;
            padding: 4px 6px;
            background: #eeeeee;
            font-size: 36px;
            line-height: 1.1;
        }

        th {
            text-align: center;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>姓名</th>
            <th>年龄</th>
            <th>职业</th>
        </tr>
        <tr>
            <td>张三</td>
            <td>25</td>
            <td>工程师</td>
        </tr>
        <tr>
            <td>李四</td>
            <td>30</td>
            <td>医生</td>
        </tr>
        <tr>
            <td>王五</td>
            <td>28</td>
            <td>教师</td>
        </tr>
    </table>
</body>
</html>
