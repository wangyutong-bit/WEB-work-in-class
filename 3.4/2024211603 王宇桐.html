    <div>
        //确认框使用
        <script type = "text/javascript">
            function showconfirm(){
                var r=confirm("你写作业了吗？");
                if(r==true)
                {
                    alert("我写作业了");
                }
                else
                {
                    alert("我还没写作业");
                }
            }
        </script>
    </div>
    <input type="button" onclick="showconfirm()" value="显示确认框">
    <div>
        //提示框使用
        <script type="text/javascript">
            function showprompt(){
                var name = prompt("请输入你的名字：","王宇桐");
                if(name!=null&&name!=""){
                    document.write("你好，" + name + "!");
                }
            }
            
        </script>
    </div>
    <input type="button" onclick="showprompt()" value="显示提示框">
