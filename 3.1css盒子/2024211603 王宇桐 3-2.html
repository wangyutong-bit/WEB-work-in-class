<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签盒子</title>
    <style>
        .one{
            color: rgb(209, 219, 219);
            font-size: 14px;
            font-weight:400 ;/*#400默认 */
            font-family: "微软雅黑";/*字体*/
            text-align: left;/*对齐*/
            line-height: 1.8;/*行间距*/
            text-indent: 2em;/*首行缩进*/
            background-color: blue;
            background-size:contain ;/*图片的样式*/
            background-image:url("image-ex-2-2-tiananmen.jpg");/*背景图片*/
            background-repeat: no-repeat;/*平铺*/
            background-position: left top;/*图片位置*/
            
        }
        div{
            margin: 15px auto;
            border: 1px dashed #e7e5e5;
            padding: 10px 20px;
            
        }
        
        
    </style>
</head>
<body>
    <p class = "one">
        我是一个段落， 我是一个段落， 我是一个段落， 我是一个段落， 我是一个段落， 我是一个段落， 我是一个段落， 我是一个段落， 我是一个段落， 我是一个段落，
    </p>
    <div>
        卧室
    </div>
    <div>
        沙发
    </div>
    <div>
        餐厅
    </div>
    <div>
        浴室
    </div>
    <div>
        厨房
    </div>
</body>
</html>
