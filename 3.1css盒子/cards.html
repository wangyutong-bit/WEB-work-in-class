<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成语故事卡片</title>
    <link rel="stylesheet" href="cards.css">
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="bg" style="background-color: aquamarine;width: auto;"></div>
            <h2 class="title">悬梁刺股</h2>
            <p class="brief">孙敬悬头发读书，苏秦大腿刺针自醒。两位古人以此刻苦读书。</p>
            <p class="detail">孙敬为防瞌睡，用绳悬头发。苏秦读书困倦时用锥子刺大腿。两人最终<a href="#">成为杰出人物</a>，励志我们持之以恒。</p>
        </div>

        <div class="card">
            <div class="bg" style="background-color: #99caca;width: auto;"></div>
            <h2 class="title">凿壁偷光</h2>
            <p class="brief">匡衡家贫无灯，凿穿邻墙借光读书。虽条件艰苦，却能充分利用资源。</p>
            <p class="detail">匡衡凿开邻家墙壁借光读书，最终<a href="#">成为经学家</a>。告诉我们贫困不是失败理由，坚持才是关键。</p>
        </div>
    </div>
</body>
</html>
