<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            min-height: 100vh;
        }
        .container{
            width: 400px;
            height: 400px;
            background-color: aquamarine;
            float:right;
        }
        .box1{
            width: 100px;
            height: 100px;
            background-color: rgb(234, 29, 29);
            border: 2px;
            flex-direction: row;
            text-align: center;
        }
        .box2{
            width: 100px;
            height: 100px;
            background-color: bisque;
            border: 2px;
            flex-direction: row;
            text-align: center;
            display: block;
    
        }
        .box3{
            width: 100px;
            height: 100px;
            background-color: rgb(228, 90, 189);
            border: 2px;
            flex-direction: row;
            text-align: center;
            display: block;
            clear: both;
        }
        .box4{
             width: 100px;
            height: 100px;
            background-color: rgb(230, 230, 78);
            border: 2px;
            flex-direction: row;
            text-align: center;
            float: left;
            display: block;
        }
    
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">
            111
        </div>
        <div class="box2">
            222
        </div>
        <div class="box3">
            333
        </div>
        <div class="box4">
            444
        </div>
    </div>
</body>
</html>
