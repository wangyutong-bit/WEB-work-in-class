            <div class="brief">
                战国经典寓言，喻<span class="tag">恒心</span>与<span class="tag">毅力</span>可战胜一切困难
            </div>
            <div class="detail">
                <p>北山愚公年近九十，因太行、王屋二山阻隔出入，遂召集家人决心挖平大山。</p>
                <p>河曲智叟嘲笑其不自量力，愚公反驳：“我死有子，子死有孙，<span class="tag">子子孙孙</span>无穷匮也；而山不加增，何苦而不平？”</p>
                <p>其<span class="tag">诚心</span>与<span class="tag">坚持</span>感动天帝，天帝派夸娥氏二子背走二山，冀之南、汉之阴终无陇断。</p>
                <p style="color:#8B4513; font-weight:bold; margin-top:10px;">寓意：只要有<span class="tag">恒心</span>、有<span class="tag">毅力</span>，再大的困难也能克服。</p>

            </div>
